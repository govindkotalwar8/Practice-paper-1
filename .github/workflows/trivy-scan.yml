name: Trivy Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy & Dependencies
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
          sudo sh -s -- -b /usr/local/bin v0.69.3
          pip install pyyaml
          mkdir -p results .trivy_cache

      # ==========================================
      # PART 1: EXTRACT UNIQUE IMAGES
      # ==========================================
      - name: Step 1 - Image Extraction
        id: extraction
        run: |
          python << 'EOF'
          import os, yaml, json

          def extract_images(data):
              images = []
              if isinstance(data, dict):
                  for k, v in data.items():
                      if k == "image":
                          # Fix: Force string conversion to handle floats/ints
                          if isinstance(v, (str, int, float)):
                              images.append(str(v).strip())
                          elif isinstance(v, dict):
                              repo = str(v.get("repository", "")).strip()
                              tag = str(v.get("tag", "")).strip()
                              if repo and tag: images.append(f"{repo}:{tag}")
                      else:
                          images.extend(extract_images(v))
              elif isinstance(data, list):
                  for item in data:
                      images.extend(extract_images(item))
              return images

          mapping = []
          unique_images = set()

          if not os.path.exists("deployments"):
              print("No 'deployments' directory found. Skipping.")
          else:
              for root, _, files in os.walk("deployments"):
                  for file in files:
                      if file.endswith((".yaml", ".yml")):
                          rel = os.path.relpath(root, "deployments").split(os.sep)
                          if len(rel) < 2: continue
                          app, env = rel[0], rel[1]
                          try:
                              with open(os.path.join(root, file)) as f:
                                  for doc in yaml.safe_load_all(f):
                                      if not doc: continue
                                      for img in extract_images(doc):
                                          if img and img.lower() != "none":
                                              mapping.append({"app": app, "env": env, "image": img})
                                              unique_images.add(img)
                          except Exception as e: print(f"Error parsing {file}: {e}")

          with open("results/mapping.json", "w") as f: json.dump(mapping, f)
          with open("results/unique_images.json", "w") as f: json.dump(list(unique_images), f)
          print(f"Found {len(unique_images)} unique images across {len(mapping)} deployments.")
          EOF

      # ==========================================
      # PART 2: SCAN UNIQUE IMAGES (NO DUPLICATES)
      # ==========================================
      - name: Step 2 - Parallel Scanning
        run: |
          python << 'EOF'
          import json, subprocess, os
          from concurrent.futures import ThreadPoolExecutor

          with open("results/unique_images.json") as f:
              unique_images = json.load(f)

          if not unique_images:
              print("No images to scan.")
              with open("results/scan_results.json", "w") as f: json.dump({}, f)
              exit(0)

          # Download DB once before parallel threads start
          subprocess.run(["trivy", "image", "--download-db-only", "--quiet"], check=True)

          def scan(img):
              print(f"Scanning: {img}")
              cmd = ["trivy", "image", "--format", "json", "--quiet", "--severity", "HIGH,CRITICAL", img]
              try:
                  res = subprocess.run(cmd, capture_output=True, text=True)
                  data = json.loads(res.stdout)
                  c_count = 0
                  h_count = 0
                  for r in data.get("Results", []):
                      for v in r.get("Vulnerabilities", []):
                          sev = v.get("Severity")
                          if sev == "CRITICAL": c_count += 1
                          elif sev == "HIGH": h_count += 1
                  return img, {"critical": c_count, "high": h_count}
              except Exception as e:
                  print(f"Error scanning {img}: {e}")
                  return img, {"critical": 0, "high": 0}

          # Using 2 workers to avoid registry rate limits
          with ThreadPoolExecutor(max_workers=2) as exe:
              results = dict(exe.map(scan, unique_images))

          with open("results/scan_results.json", "w") as f:
              json.dump(results, f)
          EOF

      # ==========================================
      # PART 3: AGGREGATE & REPORT
      # ==========================================
      - name: Step 3 - Final Reporting
        run: |
          python << 'EOF'
          import json
          from collections import defaultdict

          try:
              with open("results/mapping.json") as f: mapping = json.load(f)
              with open("results/scan_results.json") as f: scans = json.load(f)
          except FileNotFoundError:
              print("Required data files not found.")
              exit(0)

          report = defaultdict(lambda: defaultdict(lambda: {"critical": 0, "high": 0, "images": []}))

          for item in mapping:
              app, env, img = item['app'], item['env'], item['image']
              res = scans.get(img, {"critical": 0, "high": 0})

              report[app][env]["critical"] += res["critical"]
              report[app][env]["high"] += res["high"]
              if img not in report[app][env]["images"]:
                  report[app][env]["images"].append(img)

          with open("results/final_report.json", "w") as f:
              json.dump(report, f, indent=2)
          print(json.dumps(report, indent=2))
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-full-report
          path: results/final_report.json