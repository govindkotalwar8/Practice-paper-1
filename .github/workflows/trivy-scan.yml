name: Trivy Scan

on:
  push:
    branches: [ trivy_scan ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          sudo apt-get update && sudo apt-get install -y jq

      - name: 1. Robust Image Extraction
        run: |
          mkdir -p results
          > results/mapping.txt

          find deployments -type f \( -name "*.yaml" -o -name "*.yml" \) | while read -r file; do
            app=$(echo "$file" | cut -d'/' -f2)
            env=$(echo "$file" | cut -d'/' -f3)

            # 1. Capture standard "image: repo:tag" strings
            yq eval '.. | select(has("image")) | .image | select(tag == "!!str")' "$file" | while read -r img; do
              [[ -n "$img" && "$img" != "null" ]] && echo "$app|$env|$img" >> results/mapping.txt
            done

            # 2. Capture Helm-style split "image: {repository: x, tag: y}"
            yq eval '.. | select(has("image")) | .image | select(has("repository")) | .repository + ":" + .tag' "$file" | while read -r img; do
              [[ -n "$img" && "$img" != "null:" ]] && echo "$app|$env|$img" >> results/mapping.txt
            done
          done

      - name: 2. Parallel Scan (Isolated Cache)
        run: |
          # Download DB once to a master location
          mkdir -p .trivy_master_cache
          trivy image --download-db-only --cache-dir .trivy_master_cache --quiet

          sort -u -k3,3 -t'|' results/mapping.txt | cut -d'|' -f3 > results/unique_images.txt

          # Scan with isolated caches to prevent filesystem locks
          # We use a temp file per process to avoid I/O race conditions
          cat results/unique_images.txt | xargs -I {} -P 4 sh -c '
            img="{}"
            # Create a dedicated temp cache for THIS process only
            job_cache=$(mktemp -d)
            cp -r .trivy_master_cache/* "$job_cache/"
            
            res=$(trivy image --skip-db-update --cache-dir "$job_cache" --format json --quiet --severity HIGH,CRITICAL "$img" || echo "{\"Results\":[]}")
            
            # Cleanup temp cache immediately
            rm -rf "$job_cache"

            crit=$(echo "$res" | jq "[.Results[].Vulnerabilities[]? | select(.Severity==\"CRITICAL\")] | length" 2>/dev/null || echo 0)
            high=$(echo "$res" | jq "[.Results[].Vulnerabilities[]? | select(.Severity==\"HIGH\")] | length" 2>/dev/null || echo 0)
            
            # Write to a unique file to avoid I/O collisions
            echo "$img|$crit|$high" >> "results/scan_$(echo "$img" | tr -dc "[:alnum:]").txt"
          '
          # Merge results into one file
          cat results/scan_*.txt > results/scan_data.txt

      - name: 3. Assemble Final JSON
        run: |
          jq -n \
            --slurpfile mapping <(cat results/mapping.txt | jq -R 'split("|") | {app:.[0], env:.[1], img:.[2]}') \
            --slurpfile scans <(cat results/scan_data.txt | jq -R 'split("|") | {img:.[0], crit:.[1], high:.[2]}') \
            '
            reduce $mapping[] as $m ({};
              ($scans[] | select(.img == $m.img)) as $s |
              .[$m.app][$m.env] = {"critical": ($s.crit|tonumber), "high": ($s.high|tonumber)}
            )
            ' > results/final_report.json

      - name: 4. Display & Upload
        run: |
          echo "==== Scan Summary ===="
          cat results/final_report.json
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: results/final_report.json