name: Trivy Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy & Dependencies
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
          sudo sh -s -- -b /usr/local/bin v0.69.3
          pip install pyyaml
          mkdir -p results .trivy_cache

      # ==========================================
      # STEP 1: EXTRACT IMAGES
      # ==========================================
      - name: Step 1 - Image Extraction
        run: |
          python << 'EOF'
          import os, yaml, json, logging

          logging.basicConfig(level=logging.INFO, format='[%(levelname)s] %(message)s')

          def extract_images(data):
              images = []
              if isinstance(data, dict):
                  for k, v in data.items():
                      if k == "image":
                          if isinstance(v, (str, int, float)):
                              images.append(str(v).strip())
                          elif isinstance(v, dict):
                              repo = str(v.get("repository", "")).strip()
                              tag = str(v.get("tag", "")).strip()
                              if repo and tag:
                                  images.append(f"{repo}:{tag}")
                      else:
                          images.extend(extract_images(v))
              elif isinstance(data, list):
                  for item in data:
                      images.extend(extract_images(item))
              return images

          mapping = []
          unique_images = set()

          if not os.path.exists("deployments"):
              logging.info("No 'deployments' directory found.")
          else:
              for root, _, files in os.walk("deployments"):
                  for file in files:
                      if file.endswith((".yaml", ".yml")):
                          rel = os.path.relpath(root, "deployments").split(os.sep)

                          if len(rel) >= 2:
                              app, env = rel[0], rel[1]
                          else:
                              app, env = "unknown", "unknown"

                          filepath = os.path.join(root, file)

                          try:
                              with open(filepath) as f:
                                  docs = yaml.safe_load_all(f)
                                  found = False

                                  for doc in docs:
                                      if not doc:
                                          continue
                                      for img in extract_images(doc):
                                          if img and img.lower() != "none":
                                              found = True
                                              mapping.append({"app": app, "env": env, "image": img})
                                              unique_images.add(img)

                                  if not found:
                                      logging.warning(f"No valid image found in {filepath}")

                          except Exception as e:
                              logging.error(f"Parsing failed for {filepath}: {e}")

          with open("results/mapping.json", "w") as f:
              json.dump(mapping, f)

          with open("results/unique_images.json", "w") as f:
              json.dump(list(unique_images), f)

          logging.info(f"Found {len(unique_images)} unique images across {len(mapping)} deployments.")
          EOF

      # ==========================================
      # STEP 2: SCAN IMAGES (FIXED CONCURRENCY)
      # ==========================================
      - name: Step 2 - Parallel Scanning
        run: |
          python << 'EOF'
          import json, subprocess, os, logging
          from concurrent.futures import ThreadPoolExecutor, as_completed

          logging.basicConfig(level=logging.INFO, format='[%(levelname)s] %(message)s')

          if not os.path.exists("results/unique_images.json"):
              exit(0)

          with open("results/unique_images.json") as f:
              unique_images = json.load(f)

          if not unique_images:
              with open("results/scan_results.json", "w") as f:
                  json.dump({}, f)
              exit(0)

          subprocess.run(["trivy", "image", "--download-db-only", "--quiet"], check=True)

          max_workers = min(4, os.cpu_count() or 2)

          def scan(img):
              logging.info(f"Scanning: {img}")
              cmd = [
                  "trivy", "image",
                  "--format", "json",
                  "--quiet",
                  "--severity", "HIGH,CRITICAL",
                  "--cache-dir", ".trivy_cache",
                  img
              ]

              try:
                  res = subprocess.run(cmd, capture_output=True, text=True, timeout=300)

                  if res.returncode != 0:
                      logging.error(f"Trivy failed for {img}: {res.stderr}")
                      return img, {"critical": 0, "high": 0}

                  if not res.stdout.strip():
                      return img, {"critical": 0, "high": 0}

                  data = json.loads(res.stdout)

                  c, h = 0, 0
                  for r in data.get("Results", []):
                      for v in r.get("Vulnerabilities", []):
                          if v.get("Severity") == "CRITICAL":
                              c += 1
                          elif v.get("Severity") == "HIGH":
                              h += 1

                  return img, {"critical": c, "high": h}

              except subprocess.TimeoutExpired:
                  logging.error(f"[TIMEOUT] {img}")
                  return img, {"critical": 0, "high": 0}

              except Exception as e:
                  logging.error(f"Scan failed for {img}: {e}")
                  return img, {"critical": 0, "high": 0}

          results = {}

          with ThreadPoolExecutor(max_workers=max_workers) as executor:
              future_to_img = {executor.submit(scan, img): img for img in unique_images}

              for future in as_completed(future_to_img):
                  img = future_to_img[future]
                  try:
                      image, result = future.result()
                      results[image] = result
                  except Exception as e:
                      logging.error(f"[FATAL] Future failed for {img}: {e}")
                      results[img] = {"critical": 0, "high": 0}

          # 🔍 VALIDATION
          if len(results) != len(unique_images):
              logging.warning(f"Mismatch: expected {len(unique_images)}, got {len(results)}")
              missing = set(unique_images) - set(results.keys())
              if missing:
                  logging.error(f"Missing scans: {missing}")

          with open("results/scan_results.json", "w") as f:
              json.dump(results, f)

          logging.info("Scanning completed.")
          EOF

      # ==========================================
      # STEP 3: REPORT
      # ==========================================
      - name: Step 3 - Final Reporting
        run: |
          python << 'EOF'
          import json, logging
          from collections import defaultdict

          logging.basicConfig(level=logging.INFO, format='[%(levelname)s] %(message)s')

          try:
              with open("results/mapping.json") as f:
                  mapping = json.load(f)
              with open("results/scan_results.json") as f:
                  scans = json.load(f)
          except Exception as e:
              logging.error(f"No scan data: {e}")
              exit(0)

          report = defaultdict(lambda: defaultdict(lambda: {
              "critical": 0,
              "high": 0,
              "images": []
          }))

          for item in mapping:
              app, env, img = item["app"], item["env"], item["image"]
              res = scans.get(img, {"critical": 0, "high": 0})

              report[app][env]["critical"] += res["critical"]
              report[app][env]["high"] += res["high"]

              if img not in report[app][env]["images"]:
                  report[app][env]["images"].append(img)

          with open("results/final_report.json", "w") as f:
              json.dump(report, f, indent=2)

          logging.info("FINAL REPORT")
          print(json.dumps(report, indent=2))
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-full-report
          path: results/final_report.json