name: Trivy Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          # Install latest Trivy (v0.69.3+)
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          # Ensure yq and jq are present
          sudo apt-get update && sudo apt-get install -y jq

      - name: 1. Extract Images
        run: |
          mkdir -p results
          # Clear previous runs
          > results/mapping.txt

          # Precise extraction based on deployments/app/env/ structure
          find deployments -type f \( -name "*.yaml" -o -name "*.yml" \) | while read -r file; do
            # Extract App and Env from path
            app=$(echo "$file" | cut -d'/' -f2)
            env=$(echo "$file" | cut -d'/' -f3)

            # Extract full image strings only
            yq eval '.. | select(has("image")) | .image | select(. != null)' "$file" | while read -r img; do
              # Ensure we don't capture 'null' or empty lines
              if [[ -n "$img" && "$img" != "null" ]]; then
                echo "$app|$env|$img" >> results/mapping.txt
              fi
            done
          done

      - name: 2. Parallel Scan (Fixed Cache Lock)
        run: |
          # Pre-download DB to a shared location to avoid parallel download conflicts
          mkdir -p .trivycache
          trivy image --download-db-only --cache-dir .trivycache --quiet

          sort -u -k3,3 -t'|' results/mapping.txt | cut -d'|' -f3 > results/unique_images.txt

          # Scan images using isolated cache per process to prevent locking errors
          cat results/unique_images.txt | xargs -I {} -P 4 sh -c '
            img="{}"
            # Create a unique temp dir for this specific scan lock
            tmp_cache=$(mktemp -d)
            
            # Scan with --skip-db-update because we downloaded it above
            # Use --cache-dir .trivycache for read-only access to DB
            res=$(trivy image --skip-db-update --cache-dir .trivycache --format json --quiet --severity HIGH,CRITICAL "$img" || echo "{\"Results\":[]}")
            
            # Cleanup temp dir
            rm -rf "$tmp_cache"

            crit=$(echo "$res" | jq "[.Results[].Vulnerabilities[]? | select(.Severity==\"CRITICAL\")] | length" 2>/dev/null || echo 0)
            high=$(echo "$res" | jq "[.Results[].Vulnerabilities[]? | select(.Severity==\"HIGH\")] | length" 2>/dev/null || echo 0)
            
            echo "$img|$crit|$high" >> results/scan_data.txt
          '

      - name: 3. Assemble Final JSON
        run: |
          # Use a simpler JQ approach to avoid the "filename" error on older JQ versions
          jq -n \
            --slurpfile mapping <(cat results/mapping.txt | jq -R 'split("|") | {app:.[0], env:.[1], img:.[2]}') \
            --slurpfile scans <(cat results/scan_data.txt | jq -R 'split("|") | {img:.[0], crit:.[1], high:.[2]}') \
            '
            reduce $mapping[] as $m ({};
              ($scans[] | select(.img == $m.img)) as $s |
              .[$m.app][$m.env] = {"critical": ($s.crit|tonumber), "high": ($s.high|tonumber)}
            )
            ' > results/final_report.json

      - name: 4. Display & Upload
        run: |
          echo "==== Scan Summary ===="
          cat results/final_report.json
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: results/final_report.json