name: Trivy Scan

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

          # Install jq
          sudo apt-get update && sudo apt-get install -y jq

          # Install yq (IMPORTANT)
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Strict Image Extraction
        run: |
          mkdir -p results
          > results/mapping.txt

          find deployments -type f \( -name "*.yaml" -o -name "*.yml" \) | while read -r file; do

            # Extract app and env safely
            rel_path="${file#deployments/}"
            IFS='/' read -ra parts <<< "$rel_path"

            app="${parts[0]}"
            env="${parts[1]}"

            # Extract images
            yq eval '.. | select(has("image")) | .image | (select(tag == "!!str") // (.repository + ":" + .tag))' "$file" | while read -r img; do

              img=$(echo "$img" | tr -d '"' | tr -d "'")

              if [[ -n "$img" && "$img" != "null" && "$img" != "null:null" ]]; then
                echo "$app|$env|$img" >> results/mapping.txt
              fi
            done
          done

          # Remove duplicates early
          sort -u results/mapping.txt -o results/mapping.txt

      - name: Create Scan Script
        run: |
          cat << 'EOF' > scan_image.sh
          #!/bin/bash
          img=$1

          safe_name=$(echo "$img" | tr -dc '[:alnum:]')
          output_file="results/scan_${safe_name}.json"

          # Run scan with timeout and logging
          timeout 5m trivy image \
            --skip-db-update \
            --cache-dir .trivy_cache \
            --format json \
            --quiet \
            --severity HIGH,CRITICAL \
            "$img" > "$output_file" 2>> results/errors.log \
            || echo "{\"Results\":[]}" > "$output_file"

          # Extract vulnerability counts
          crit=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$output_file" 2>/dev/null || echo 0)
          high=$(jq '[.Results[].Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$output_file" 2>/dev/null || echo 0)

          echo "$img|$crit|$high" >> results/scan_data.txt
          EOF

          chmod +x scan_image.sh

      - name: Parallel Scan
        run: |
          mkdir -p .trivy_cache
          mkdir -p results

          # Download DB once
          trivy image --download-db-only --cache-dir .trivy_cache --quiet

          # Get unique images
          cut -d'|' -f3 results/mapping.txt | sort -u > results/unique_images.txt

          # Run scans (controlled parallelism)
          cat results/unique_images.txt | xargs -n 1 -P 2 ./scan_image.sh

      - name: Assemble Final JSON
        run: |
          jq -n \
            --slurpfile mapping <(cat results/mapping.txt | jq -R 'split("|") | {app:.[0], env:.[1], img:.[2]}') \
            --slurpfile scans <(cat results/scan_data.txt | jq -R 'split("|") | {img:.[0], crit:.[1], high:.[2]}') \
            '
            reduce $mapping[] as $m ({};
              ($scans[] | select(.img == $m.img)) as $s |
              .[$m.app][$m.env] = {
                "critical": ($s.crit|tonumber),
                "high": ($s.high|tonumber)
              }
            )
            ' > results/final_report.json

      - name: 5. Display Report
        run: |
          echo "==== Final Scan Summary ===="
          cat results/final_report.json

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: results/final_report.json